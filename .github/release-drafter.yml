name-template: 'Release v$NEXT_PATCH_VERSION'
tag-template: "$RESOLVED_VERSION"
change-template: "- #$NUMBER $TITLE @$AUTHOR"
sort-direction: ascending
category-template: '**$TITLE**'

categories:
  - title: "🚨 Breaking changes"
    labels:
      - "breaking-change"
  - title: "✨ New features"
    labels:
      - "new-feature"
  - title: "🐛 Bug fixes"
    labels:
      - "bugfix"
#  - title: "🚀 Enhancements"
#    labels:
#      - "enhancement"
#      - "refactor"
#      - "performance"
#  - title: "🧰 Maintenance"
#    labels:
#      - "maintenance"
#      - "ci"
#  - title: "📚 Documentation"
#    labels:
#      - "documentation"
  - title: "⬆️ Dependency updates"
    collapse-after: 5
    labels:
      - "dependency-update"
#  - title: "🚨🚨 Security Fixes 🚨🚨"
#    labels:
#      - "security"


include-labels:
  - "bugfix"
  - "new-feature"
  - "breaking-change"

no-changes-template: '- No changes'

# The shared build workflow appends a Full Changelog compare link to the
# release body (release-drafter cannot render 4-part version tags).
template: |
  **What's Changed**

  $CHANGES
